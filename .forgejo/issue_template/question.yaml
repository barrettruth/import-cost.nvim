name: Question
description: Ask a question about using import-cost.nvim
title: 'question: '
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for usage questions or general discussion about import-cost.nvim.
        For bug reports, please use the bug report form instead.
        For feature ideas, please use the feature request form instead.

  - type: textarea
    attributes:
      label: Question
    validations:
      required: true

  - type: textarea
    attributes:
      label: Context
      description: Relevant details such as filetype, config, Node package manager, or screenshots
